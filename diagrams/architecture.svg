<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Arquitetura Azure — Exposição Segura de API Interna</title>
  <desc>Diagrama mostrando o fluxo de tráfego da Internet até a API interna passando por WAF, subnets e Private Endpoint, com acesso ao Storage via Managed Identity.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-deny" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #2C2C2A; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .arr { fill: none; stroke: #378ADD; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="620" fill="#FAFAF8"/>

  <!-- ─── INTERNET ─── -->
  <rect x="18" y="260" width="80" height="44" rx="8" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.8"/>
  <text class="th" x="58" y="278" text-anchor="middle">Internet</text>
  <text class="ts" x="58" y="294" text-anchor="middle">usuários</text>

  <!-- Arrow Internet → WAF -->
  <line x1="98" y1="282" x2="138" y2="282" stroke="#378ADD" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="118" y="274" text-anchor="middle" fill="#185FA5">HTTPS</text>

  <!-- ─── AZURE BOUNDARY ─── -->
  <rect x="136" y="30" width="526" height="560" rx="16" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="ts" x="152" y="50" fill="#888780">Azure — brazilsouth</text>

  <!-- ─── VNet ─── -->
  <rect x="148" y="60" width="502" height="510" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text class="ts" x="164" y="78" fill="#888780">VNet  10.0.0.0/16</text>

  <!-- ─── SUBNET WEB ─── -->
  <rect x="164" y="88" width="220" height="240" rx="10" fill="#E6F1FB" fill-opacity="0.5" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text class="ts" x="174" y="106" fill="#185FA5">snet-web  10.0.1.0/24</text>

  <!-- App Gateway / WAF box -->
  <rect x="182" y="116" width="184" height="66" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
  <text class="th" x="274" y="141" text-anchor="middle" fill="#0C447C">Application Gateway</text>
  <text class="ts" x="274" y="161" text-anchor="middle" fill="#185FA5">WAF v2 · OWASP 3.2</text>

  <!-- NSG label web -->
  <rect x="182" y="200" width="184" height="36" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="th" x="274" y="214" text-anchor="middle" fill="#0C447C">NSG — snet-web</text>
  <text class="ts" x="274" y="228" text-anchor="middle" fill="#185FA5">allow 443 inbound</text>

  <!-- Availability Zones indicator -->
  <rect x="182" y="250" width="184" height="28" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text class="ts" x="274" y="268" text-anchor="middle" fill="#888780">Zone-redundant (AZ 1/2/3)</text>

  <!-- ─── SUBNET APP ─── -->
  <rect x="400" y="88" width="230" height="240" rx="10" fill="#E1F5EE" fill-opacity="0.5" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text class="ts" x="410" y="106" fill="#0F6E56">snet-app  10.0.2.0/24</text>

  <!-- App Service / API box -->
  <rect x="418" y="116" width="194" height="66" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="th" x="515" y="141" text-anchor="middle" fill="#085041">App Service</text>
  <text class="ts" x="515" y="161" text-anchor="middle" fill="#0F6E56">API interna · Managed Identity</text>

  <!-- NSG App box -->
  <rect x="418" y="200" width="194" height="56" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="th" x="515" y="214" text-anchor="middle" fill="#085041">NSG — snet-app</text>
  <text class="ts" x="515" y="226" text-anchor="middle" fill="#0F6E56">allow 443 from snet-web</text>
  <text class="ts" x="515" y="238" text-anchor="middle" fill="#E24B4A">deny 0.0.0.0/0 inbound</text>

  <!-- Autoscale indicator -->
  <rect x="418" y="270" width="194" height="28" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text class="ts" x="515" y="288" text-anchor="middle" fill="#888780">Autoscale · min 2 / max 10</text>

  <!-- ─── Arrow WAF → Private Endpoint → API ─── -->
  <line x1="366" y1="149" x2="416" y2="149" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <text class="ts" x="391" y="141" text-anchor="middle" fill="#0F6E56">Private</text>
  <text class="ts" x="391" y="153" text-anchor="middle" fill="#0F6E56">Endpoint</text>

  <!-- ─── DENY arrow (direct internet to app) ─── -->
  <path d="M 110 282 Q 110 440 418 348" fill="none" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow-deny)"/>
  <text class="ts" x="220" y="442" fill="#A32D2D">✕ deny direto (NSG)</text>

  <!-- ─── STORAGE ACCOUNT ─── -->
  <rect x="418" y="370" width="194" height="66" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.8"/>
  <text class="th" x="515" y="395" text-anchor="middle" fill="#412402">Storage Account</text>
  <text class="ts" x="515" y="415" text-anchor="middle" fill="#633806">Blob · Private Endpoint</text>

  <!-- Arrow API → Storage via Managed Identity -->
  <line x1="515" y1="344" x2="515" y2="368" stroke="#BA7517" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)"/>
  <text class="ts" x="548" y="356" fill="#854F0B">Managed Identity</text>
  <text class="ts" x="548" y="368" fill="#854F0B">RBAC mínimo</text>

  <!-- ─── OBSERVABILIDADE ─── -->
  <rect x="164" y="360" width="220" height="88" rx="10" fill="#EEEDFE" fill-opacity="0.4" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text class="ts" x="174" y="378" fill="#534AB7">Observabilidade</text>

  <rect x="180" y="386" width="88" height="44" rx="6" fill="#CECBF6" fill-opacity="0.6" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="224" y="404" text-anchor="middle" fill="#26215C">NSG Flow</text>
  <text class="ts" x="224" y="418" text-anchor="middle" fill="#534AB7">Logs L3/L4</text>

  <rect x="280" y="386" width="88" height="44" rx="6" fill="#CECBF6" fill-opacity="0.6" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="th" x="324" y="404" text-anchor="middle" fill="#26215C">App Insights</text>
  <text class="ts" x="324" y="418" text-anchor="middle" fill="#534AB7">Métricas L7</text>

  <!-- ─── LOG ANALYTICS ─── -->
  <rect x="164" y="468" width="220" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="274" y="486" text-anchor="middle" fill="#2C2C2A">Log Analytics Workspace</text>
  <text class="ts" x="274" y="500" text-anchor="middle" fill="#5F5E5A">retenção 90 dias · KQL alerts</text>

  <!-- Arrow Obs → Log Analytics -->
  <line x1="274" y1="448" x2="274" y2="466" stroke="#888780" stroke-width="1.2" fill="none" marker-end="url(#arrow-gray)"/>

  <!-- Arrow App/Storage → Log Analytics -->
  <line x1="515" y1="438" x2="515" y2="530" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3 3"/>
  <path d="M 515 530 L 386 530 L 386 496 L 384 496" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-gray)"/>

  <!-- ─── LEGEND ─── -->
  <rect x="148" y="540" width="502" height="24" rx="6" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="168" y1="552" x2="192" y2="552" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="198" y="556">tráfego permitido</text>
  <line x1="310" y1="552" x2="334" y2="552" stroke="#E24B4A" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow-deny)"/>
  <text class="ts" x="340" y="556">bloqueado por NSG</text>
  <line x1="468" y1="552" x2="492" y2="552" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-gray)"/>
  <text class="ts" x="498" y="556">telemetria</text>
</svg>
